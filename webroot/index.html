<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝子zRam模块</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e2f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .container {
            background-color: #2a2a3a;
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #3f3f55;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 30px;
            color: #a0a0ff;
            font-weight: 500;
        }
        .slider-container {
            margin-bottom: 30px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .slider-label span:first-child {
            color: #b0b0b0;
        }
        .slider-label span:last-child {
            font-weight: bold;
            color: #ffd966;
            font-size: 1.3rem;
        }
        input[type=range] {
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #4a4a6a, #9f9fff);
            border-radius: 5px;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 2px solid #7a7aff;
            cursor: pointer;
        }
        .current-value-box {
            background-color: #1a1a28;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px dashed #5a5a7a;
        }
        .current-value-box div:first-child {
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .current-value-box .big-number {
            font-size: 3.5rem;
            font-weight: bold;
            color: #b3b3ff;
            line-height: 1.2;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            background-color: #3a3a55;
            border: none;
            color: white;
            padding: 14px 10px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        button.primary {
            background-color: #6a5acd;
            box-shadow: 0 4px 10px rgba(106, 90, 205, 0.3);
        }
        button.primary:hover {
            background-color: #7b6cd9;
        }
        button.secondary {
            background-color: #4a4a6a;
            border-color: #6a6a8a;
        }
        button.secondary:hover {
            background-color: #5a5a7a;
        }
        .hint {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            border-top: 1px solid #3f3f55;
            padding-top: 20px;
        }
        .status-message {
            margin-top: 15px;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            background-color: #2e2e42;
            color: #a0e0a0;
            font-size: 0.9rem;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ 宝子zRam模块 </h1>

        <div class="current-value-box">
            <div>当前运行值</div>
            <span class="big-number" id="currentSwappiness">--</span>
        </div>

        <div class="slider-container">
            <div class="slider-label">
                <span>滑动调节 (1-200)</span>
                <span id="sliderValue">150</span>
            </div>
            <input type="range" id="swappinessSlider" min="1" max="200" value="150" step="1">
        </div>

        <div class="button-group">
            <button class="secondary" id="applyTempBtn">⏱️ 临时生效</button>
            <button class="primary" id="saveAndApplyBtn">💾 永久生效</button>
        </div>

        <div class="status-message" id="statusMsg"></div>
        <div class="hint">
            ⚡ 临时生效：临时改变，重启失效。<br>
